<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>SpaceCo — Book a Space</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=Sora:wght@400;500;600;700&display=swap');
  :root {
    --bg:#0e0e10;--bg2:#16171c;--bg3:#1c1d24;--card:#22232d;
    --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
    --text:#e6e8f0;--text2:#9095b0;--text3:#585e7a;
    --accent:#d4a843;--accent2:#e8c06a;
    --green:#2ec97e;--green-bg:rgba(46,201,126,0.12);
    --amber:#d4a843;--amber-bg:rgba(212,168,67,0.12);
    --red:#e05555;--red-bg:rgba(224,85,85,0.12);
    --blue:#4a9eff;
    --radius:12px;--radius-sm:8px;
  }
  [data-theme="light"] {
    --bg:#f7f6f2;--bg2:#ffffff;--bg3:#eeece5;--card:#ffffff;
    --border:rgba(20,20,20,0.08);--border2:rgba(20,20,20,0.16);
    --text:#1c1d22;--text2:#5b5e6e;--text3:#8b8e9c;
    --accent:#b8863a;--accent2:#d4a843;
    --green:#1e9e63;--green-bg:rgba(30,158,99,0.1);
    --amber:#b8863a;--amber-bg:rgba(184,134,58,0.1);
    --red:#c73e3e;--red-bg:rgba(199,62,62,0.1);
    --blue:#2f7fd6;
  }
  body{transition:background .2s,color .2s;}
  .theme-toggle{position:fixed;top:16px;right:16px;width:40px;height:40px;border-radius:50%;background:var(--card);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;z-index:50;transition:background .2s;}
  .theme-toggle:hover{border-color:var(--accent);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px;}
  *{scrollbar-width:thin;scrollbar-color:var(--accent) transparent;}
  ::-webkit-scrollbar{width:9px;height:9px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--accent2),var(--accent));border-radius:20px;border:2px solid var(--bg);background-clip:padding-box;}
  ::-webkit-scrollbar-thumb:hover{background:var(--accent2);border:2px solid var(--bg);background-clip:padding-box;}
  ::-webkit-scrollbar-corner{background:transparent;}
  .wrap{max-width:760px;margin:0 auto;padding:0 16px;}
  header{padding:28px 0 20px;text-align:center;border-bottom:1px solid var(--border);margin-bottom:24px;}
  .logo-img{height:52px;width:auto;max-width:80%;}
  .tagline{font-size:13px;color:var(--text3);margin-top:4px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:16px;}
  .card-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px;}
  label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500;}
  input[type=date],input[type=text],input[type=tel],textarea,select{
    width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);
    padding:10px 12px;border-radius:var(--radius-sm);font-size:14px;font-family:inherit;outline:none;
  }
  input:focus,textarea:focus,select:focus{border-color:var(--accent);}
  .row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
  .row>div{flex:1;min-width:140px;}
  .room-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;-webkit-overflow-scrolling:touch;}
  .room-tab{flex-shrink:0;padding:8px 14px;border-radius:20px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s;}
  .room-tab.active{background:var(--accent);color:#1a1305;border-color:var(--accent);}
  .mode-tabs{display:flex;gap:8px;margin-bottom:20px;}
  .mode-tab{flex:1;text-align:center;padding:12px 8px;border-radius:var(--radius-sm);background:var(--bg3);border:1px solid var(--border2);color:var(--text2);font-size:13.5px;font-weight:600;cursor:pointer;transition:all .15s;}
  .mode-tab.active{background:var(--accent);color:#1a1305;border-color:var(--accent);}
  .day-picker{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
  .day-pill{flex:1;min-width:36px;text-align:center;padding:9px 0;border-radius:var(--radius-sm);background:var(--bg3);border:1px solid var(--border2);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;transition:all .12s;user-select:none;}
  .day-pill.active{background:var(--accent);color:#1a1305;border-color:var(--accent);}
  .pkg-line-card{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:12px 14px;}
  .pkg-line-remove{background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer;line-height:1;padding:2px;}
  .date-nav{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
  .date-nav button{background:var(--bg3);border:1px solid var(--border2);color:var(--text);width:36px;height:36px;border-radius:var(--radius-sm);cursor:pointer;font-size:15px;flex-shrink:0;}
  .date-nav input{flex:1;}
  .slot-legend{display:flex;gap:16px;font-size:12px;color:var(--text3);margin-bottom:12px;}
  .legend-dot{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:5px;vertical-align:middle;}
  .slots-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:8px;}
  .slot-pill{padding:9px 6px;text-align:center;border-radius:var(--radius-sm);font-size:12.5px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .12s;}
  .slot-free{background:var(--green-bg);color:var(--green);border-color:rgba(46,201,126,0.3);}
  .slot-free:hover{background:rgba(46,201,126,0.22);}
  .slot-free.selected{background:var(--accent);color:#1a1305;border-color:var(--accent);}
  .slot-busy{background:var(--bg3);color:var(--text3);cursor:not-allowed;text-decoration:line-through;}
  .btn{background:var(--accent);color:#1a1305;border:none;padding:12px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:700;cursor:pointer;width:100%;transition:opacity .15s;}
  .btn:hover{opacity:0.9;}
  .btn:disabled{background:var(--bg3);color:var(--text3);cursor:not-allowed;}
  .hint{font-size:12px;color:var(--text3);margin-top:8px;}
  .error-box{background:var(--red-bg);color:var(--red);border:1px solid rgba(224,85,85,0.3);padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:14px;}
  .success-box{text-align:center;padding:40px 20px;}
  .success-icon{font-size:44px;margin-bottom:14px;}
  .success-title{font-size:19px;font-weight:700;margin-bottom:8px;}
  .success-text{font-size:14px;color:var(--text2);line-height:1.6;max-width:420px;margin:0 auto;}
  .loading{text-align:center;padding:60px 20px;color:var(--text3);font-size:13px;}
  .spin{display:inline-block;width:22px;height:22px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin-bottom:12px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .footer-note{text-align:center;font-size:11px;color:var(--text3);margin-top:20px;}
</style>
</head>

const OPEN_START_WEEKDAY='09:00', OPEN_END='23:00', OPEN_START_FRIDAY='11:00';

  mode: 'single',

function todayStr(){
  var d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function timeToMin(t){ var p=t.split(':'); return (+p[0])*60+(+p[1]); }
function minToTime(m){ var h=Math.floor(m/60), mm=m%60; return String(h).padStart(2,'0')+':'+String(mm).padStart(2,'0'); }
function fmt12(t){
  var p=t.split(':'); var h=+p[0], m=p[1];
  var ap=h>=12?'PM':'AM'; var h12=h%12; if(h12===0)h12=12;
  return h12+':'+m+' '+ap;
}
function getOpenHours(dateStr){
  var day=new Date(dateStr+'T00:00:00').getDay();
  var start = day===5 ? OPEN_START_FRIDAY : OPEN_START_WEEKDAY;
  return {start:start, end:OPEN_END};
}

// ── WhatsApp click-to-chat (no backend/API keys — opens a pre-filled chat) ──
function formatPhoneForWhatsApp(phone){
  var digits=(phone||'').replace(/\D/g,'');
  if(!digits)return '';
  if(digits.indexOf('20')===0)return digits;
  if(digits.indexOf('0')===0)return '20'+digits.substring(1);
  return digits;
}

// ── Monthly package helpers: requests are always for next calendar month ──
var PKG_WEEKDAY_LABELS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function getNextMonthInfo(){
  var now=new Date();
  var y=now.getFullYear(), m=now.getMonth()+1; // next month, 0-indexed input
  if(m>11){ m=0; y+=1; }
  var last=new Date(y, m+1, 0);
  return {
    year:y, monthIndex:m,
    ym: y+'-'+String(m+1).padStart(2,'0'),
    label: new Date(y,m,1).toLocaleDateString('en-US',{month:'long',year:'numeric'}),
    daysInMonth: last.getDate()
  };
}
function expandLineDates(weekdays, info){
  var dates=[];
  for(var d=1; d<=info.daysInMonth; d++){
    var dow=new Date(info.year, info.monthIndex, d).getDay();
    if(weekdays.indexOf(dow)!==-1){
      dates.push(info.year+'-'+String(info.monthIndex+1).padStart(2,'0')+'-'+String(d).padStart(2,'0'));
    }
  }
  return dates;
}
function formatWeekdaysShort(arr){
  return arr.slice().sort().map(function(d){return PKG_WEEKDAY_LABELS[d];}).join(', ');
}

async function sbFetchKey(key){
  try{
    var res = await fetch(SUPABASE_URL+'/rest/v1/'+TABLE+'?key=eq.'+encodeURIComponent(key)+'&select=value', {
      headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY}
    });
    var rows = await res.json();
    if(rows && rows.length && rows[0].value!==null) return JSON.parse(rows[0].value);
  }catch(e){ console.warn('fetch error',key,e); }
  return null;
}
async function sbWriteKey(key, val){
  await fetch(SUPABASE_URL+'/rest/v1/'+TABLE+'?key=eq.'+encodeURIComponent(key), {
    method:'DELETE',
    headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY}
  });
  await fetch(SUPABASE_URL+'/rest/v1/'+TABLE, {
    method:'POST',
    headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body: JSON.stringify({key:key, value: JSON.stringify(val)})
  });
}

function getBusyRanges(dateStr, room, reservations, blocks){
  var ranges=[];
  reservations.filter(function(r){return r.date===dateStr && r.room===room;}).forEach(function(r){
    ranges.push({from:timeToMin(r.from), to:timeToMin(r.to)});
  });
  (blocks||[]).filter(function(b){return b.date===dateStr && b.room===room;}).forEach(function(b){
    ranges.push({from:timeToMin(b.from), to:timeToMin(b.to)});
  });
  return ranges;
}
function rangeIsFree(startMin, endMin, busyRanges){
  return !busyRanges.some(function(b){ return startMin < b.to && endMin > b.from; });
}

async function init(){
  var res = await Promise.all([sbFetchKey('reservations'), sbFetchKey('roomBlocks')]);
  state.reservations = res[0] || [];
  state.blocks = res[1] || [];
  render();
  startLiveSync();
}

// Keep availability current with what staff see in the SpaceCo system (and other
// visitors' bookings) without a manual refresh. Paused once the visitor has picked
// a time slot and is filling in their details, so we never wipe out what they typed.
var _liveSyncTimer = null;
function startLiveSync(){
  if(_liveSyncTimer) return;
  _liveSyncTimer = setInterval(async function(){
    if(state.mode!=='single' || state.submitted || state.submitting || state.selectedStart !== null) return;
    try{
      var res = await Promise.all([sbFetchKey('reservations'), sbFetchKey('roomBlocks')]);
      state.reservations = res[0] || [];
      state.blocks = res[1] || [];
      render();
    }catch(e){ console.warn('live sync failed', e); }
  }, 30000);
}

function render(){
  var app = document.getElementById('app');
  if(state.submitted){
    app.innerHTML = renderSuccess();
    return;
  }
  if(state.pkgSubmitted){
    app.innerHTML = renderPackageSuccess();
    return;
  }

  var modeTabs = '<div class="mode-tabs">'
    + '<div class="mode-tab'+(state.mode==='single'?' active':'')+'" onclick="switchMode(\'single\')">🗓️ Single Booking</div>'
    + '<div class="mode-tab'+(state.mode==='package'?' active':'')+'" onclick="switchMode(\'package\')">📦 Monthly Package</div>'
    + '</div>';

  if(state.mode==='package'){
    app.innerHTML = modeTabs + renderPackageFlow();
    return;
  }

  var oh = getOpenHours(state.date);
  var busy = getBusyRanges(state.date, state.room, state.reservations, state.blocks);
  var startMin = timeToMin(oh.start), endMin = timeToMin(oh.end);

  var html = '';
  html += '<div class="room-tabs">' + ROOM_LIST.map(function(r){
    return '<div class="room-tab'+(r===state.room?' active':'')+'" onclick="selectRoom(\''+r.replace(/'/g,"\\'")+'\')">'+r+'</div>';
  }).join('') + '</div>';

  html += '<div class="card">';
  html += '<div class="card-title">Choose a date</div>';
  html += '<div class="date-nav">';
  html += '<button onclick="shiftDate(-1)">&#8249;</button>';
  html += '<input type="date" id="date-input" value="'+state.date+'" min="'+todayStr()+'" onchange="onDateChange(this.value)">';
  html += '<button onclick="shiftDate(1)">&#8250;</button>';
  html += '</div>';
  html += '<div class="hint">Open '+fmt12(oh.start)+' – '+fmt12(oh.end)+' on this date</div>';
  html += '</div>';

  html += '<div class="card">';
  html += '<div class="card-title">Available times — '+state.room+'</div>';
  html += '<div class="slot-legend"><span><span class="legend-dot" style="background:var(--green);"></span>Available</span><span><span class="legend-dot" style="background:var(--text3);"></span>Booked</span></div>';
  html += '<div class="slots-grid">';
  for(var m=startMin; m<endMin; m+=60){
    var slotEnd = m+60;
    var free = rangeIsFree(m, slotEnd, busy);
    var isSel = state.selectedStart===m;
    html += '<div class="slot-pill '+(free?('slot-free'+(isSel?' selected':'')):'slot-busy')+'" '
      + (free?('onclick="selectStart('+m+')"'):'')+'>'+fmt12(minToTime(m))+'</div>';
  }
  html += '</div>';
  html += '</div>';

  if(state.selectedStart!==null){
    html += renderBookingForm(busy, endMin);
  }

  app.innerHTML = modeTabs + html;
}

function switchMode(mode){
  state.mode=mode;
  state.selectedStart=null;
  state._error=null;
  render();
}

function renderBookingForm(busy, dayEndMin){
  var start = state.selectedStart;
  var maxDur = 0;
  for(var d=60; d<=dayEndMin-start; d+=60){
    if(rangeIsFree(start, start+d, busy)) maxDur=d; else break;
  }
  if(state.duration>maxDur) state.duration=maxDur||60;
  var endMin = start + state.duration;

  var html = '<div class="card">';
  html += '<div class="card-title">Your details</div>';
  html += '<div class="row"><div>';
  html += '<label>Full name *</label><input type="text" id="f-name" placeholder="e.g. Nour Ahmed" value="'+(state._name||'')+'">';
  html += '</div><div>';
  html += '<label>Phone number *</label><input type="tel" id="f-phone" placeholder="e.g. 01012345678" value="'+(state._phone||'')+'">';
  html += '</div></div>';

  html += '<div class="row"><div>';
  html += '<label>Start time</label><input type="text" value="'+fmt12(minToTime(start))+'" disabled style="opacity:0.6;">';
  html += '</div><div>';
  html += '<label>Duration</label><select id="f-duration" onchange="onDurationChange(this.value)">';
  for(var d=60; d<=maxDur; d+=60){
    html += '<option value="'+d+'" '+(d===state.duration?'selected':'')+'>'+(d===60?'1 hour':(d/60)+' hours')+'</option>';
  }
  html += '</select></div></div>';

  html += '<label>Notes (optional)</label><textarea id="f-notes" rows="2" placeholder="Anything staff should know" style="margin-bottom:14px;"></textarea>';

  html += '<div class="hint" style="margin-bottom:14px;">You\'re requesting <strong style="color:var(--text);">'+state.room+'</strong> on <strong style="color:var(--text);">'+state.date+'</strong>, '+fmt12(minToTime(start))+' – '+fmt12(minToTime(endMin))+'. This will be sent to SpaceCo staff for confirmation.</div>';

  if(state._error) html += '<div class="error-box">'+state._error+'</div>';

  html += '<button class="btn" onclick="submitBooking()" '+(state.submitting?'disabled':'')+'>'+(state.submitting?'Submitting…':'Request this slot')+'</button>';
  html += '</div>';
  return html;
}

function renderSuccess(){
  return '<div class="card success-box">'
    + '<div class="success-icon">✅</div>'
    + '<div class="success-title">Request submitted!</div>'
    + '<div class="success-text">Thanks'+(state._name?', '+state._name:'')+'. We\'ve received your request for <strong style="color:var(--text);">'+state.room+'</strong> on '+state.date+' from '+fmt12(minToTime(state.selectedStart))+' to '+fmt12(minToTime(state.selectedStart+state.duration))+'.<br><br>SpaceCo staff will confirm shortly by phone. This slot is held as pending until then.</div>'
    + '<button class="btn" style="margin-top:20px;max-width:220px;" onclick="resetFlow()">Book another slot</button>'
    + '</div>';
}

// ============================================================
// MONTHLY PACKAGE REQUEST — a cart of one or more room/weekday
// schedules for next calendar month only (first-come-first-served;
// nothing is held until SpaceCo prices it and you accept on WhatsApp).
// ============================================================
function renderPackageFlow(){
  var info = getNextMonthInfo();
  var html = '';

  html += '<div class="card">';
  html += '<div class="card-title">Monthly package request</div>';
  html += '<div class="hint" style="margin-bottom:10px;">Requesting for <strong style="color:var(--text);">'+info.label+'</strong> (next month only — that\'s the maximum in advance). Add one or more rooms/schedules below, then submit. Nothing is held until SpaceCo prices your request and you confirm on WhatsApp — so it\'s first come, first served.</div>';
  html += '</div>';

  html += '<div class="card">';
  html += '<div class="card-title">Add a schedule</div>';
  html += '<label>Room *</label><select id="pkg-line-room" style="margin-bottom:14px;"><option value="">Select room</option>'
    + ROOM_LIST.map(function(r){return '<option value="'+r+'">'+r+'</option>';}).join('') + '</select>';
  html += '<label>Which days of the week? *</label>';
  html += '<div class="day-picker" id="pkg-day-picker">' + PKG_WEEKDAY_LABELS.map(function(lbl,i){
    return '<div class="day-pill" data-day="'+i+'" onclick="toggleDayPill(this)">'+lbl+'</div>';
  }).join('') + '</div>';
  html += '<div class="row"><div>';
  html += '<label>From *</label><input type="time" id="pkg-line-from" value="09:00">';
  html += '</div><div>';
  html += '<label>To *</label><input type="time" id="pkg-line-to" value="11:00">';
  html += '</div></div>';
  html += '<div id="pkg-line-error" class="error-box" style="display:none;"></div>';
  html += '<button class="btn" onclick="addPkgLine()">+ Add to request</button>';
  html += '</div>';

  if(state.pkgLines.length){
    html += '<div class="card-title" style="padding:0 4px;">Your schedules ('+state.pkgLines.length+')</div>';
    state.pkgLines.forEach(function(line){
      html += '<div class="card pkg-line-card">'
        + '<div>'
          + '<div style="font-weight:600;font-size:13.5px;">'+line.room+'</div>'
          + '<div style="font-size:12.5px;color:var(--text2);margin-top:2px;">'+formatWeekdaysShort(line.weekdays)+' · '+fmt12(line.from)+'–'+fmt12(line.to)+'</div>'
          + '<div style="font-size:12px;color:var(--text3);margin-top:2px;">'+line.dates.length+' session'+(line.dates.length!==1?'s':'')+' in '+info.label
          + (line.busyCount>0?' · <span style="color:var(--red);">⚠ '+line.busyCount+' of these already look taken</span>':'')
          + '</div>'
        + '</div>'
        + '<button class="pkg-line-remove" onclick="removePkgLine(\''+line.id+'\')" title="Remove">✕</button>'
        + '</div>';
    });
  }

  html += '<div class="card">';
  html += '<div class="card-title">Your details</div>';
  html += '<div class="row"><div>';
  html += '<label>Full name *</label><input type="text" id="pkg-name" placeholder="e.g. Nour Ahmed" value="'+(state._pkgName||'')+'">';
  html += '</div><div>';
  html += '<label>Phone number *</label><input type="tel" id="pkg-phone" placeholder="e.g. 01012345678" value="'+(state._pkgPhone||'')+'">';
  html += '</div></div>';
  html += '<label>Notes (optional)</label><textarea id="pkg-notes" rows="2" placeholder="Anything staff should know" style="margin-bottom:14px;">'+(state._pkgNotes||'')+'</textarea>';
  if(state._pkgError) html += '<div class="error-box">'+state._pkgError+'</div>';
  html += '<button class="btn" onclick="submitPackageRequest()" '+(state.pkgSubmitting||!state.pkgLines.length?'disabled':'')+'>'+(state.pkgSubmitting?'Submitting…':'Send package request')+'</button>';
  if(!state.pkgLines.length) html += '<div class="hint">Add at least one schedule above first.</div>';
  html += '</div>';

  return html;
}

function toggleDayPill(el){ el.classList.toggle('active'); }

function addPkgLine(){
  var errEl = document.getElementById('pkg-line-error');
  errEl.style.display='none';

  var room = document.getElementById('pkg-line-room').value;
  var dayEls = document.querySelectorAll('#pkg-day-picker .day-pill.active');
  var weekdays = Array.prototype.map.call(dayEls, function(el){ return parseInt(el.getAttribute('data-day'),10); });
  var from = document.getElementById('pkg-line-from').value;
  var to = document.getElementById('pkg-line-to').value;

  if(!room){ errEl.textContent='Please choose a room.'; errEl.style.display='block'; return; }
  if(!weekdays.length){ errEl.textContent='Please choose at least one day of the week.'; errEl.style.display='block'; return; }
  if(!from||!to){ errEl.textContent='Please set a from and to time.'; errEl.style.display='block'; return; }
  if(timeToMin(to)<=timeToMin(from)){ errEl.textContent='End time must be after start time.'; errEl.style.display='block'; return; }
  if(weekdays.indexOf(5)!==-1 && timeToMin(from)<timeToMin(OPEN_START_FRIDAY)){
    errEl.textContent='Friday opens at 11:00 AM — please adjust the start time or remove Friday from this schedule.';
    errEl.style.display='block'; return;
  }

  var info = getNextMonthInfo();
  var dates = expandLineDates(weekdays, info);
  var busyCount = dates.filter(function(d){
    var busy = getBusyRanges(d, room, state.reservations, state.blocks);
    return !rangeIsFree(timeToMin(from), timeToMin(to), busy);
  }).length;

  state.pkgLines.push({
    id: 'ln_'+Date.now()+'_'+Math.random().toString(36).substr(2,5),
    room: room, weekdays: weekdays, from: from, to: to, dates: dates, busyCount: busyCount
  });
  render();
}

function removePkgLine(id){
  state.pkgLines = state.pkgLines.filter(function(l){ return l.id!==id; });
  render();
}

function buildPackageRequestMessage(r){
  var msg = '📦 New Package Request\n\nClient: '+r.client+'\nPhone: '+r.phone+'\nMonth: '+r.monthLabel+'\n';
  r.lines.forEach(function(l){
    msg += '\n• '+l.room+' — '+formatWeekdaysShort(l.weekdays)+' · '+fmt12(l.from)+'–'+fmt12(l.to)+' ('+l.dates.length+' sessions)';
  });
  if(r.notes) msg += '\n\nNotes: '+r.notes;
  msg += '\n\nOpen the dashboard to price this request.';
  return msg;
}

async function submitPackageRequest(){
  var name=(document.getElementById('pkg-name').value||'').trim();
  var phone=(document.getElementById('pkg-phone').value||'').trim();
  var notes=(document.getElementById('pkg-notes').value||'').trim();
  state._pkgName=name; state._pkgPhone=phone; state._pkgNotes=notes;

  if(!state.pkgLines.length){ state._pkgError='Please add at least one room/schedule to your request.'; render(); return; }
  if(!name || !phone){ state._pkgError='Please enter your name and phone number.'; render(); return; }

  state._pkgError=null; state.pkgSubmitting=true;
  // Open the WhatsApp tab synchronously (tied to this click) so popup blockers
  // don't block it once we redirect it after the awaited network calls below.
  var waWindow = window.open('', '_blank');
  render();

  var info = getNextMonthInfo();
  var reqObj = {
    id: 'pkg_'+Date.now()+'_'+Math.random().toString(36).substr(2,6),
    client: name, phone: phone,
    month: info.ym, monthLabel: info.label,
    lines: state.pkgLines.map(function(l){ return {id:l.id, room:l.room, weekdays:l.weekdays, from:l.from, to:l.to, dates:l.dates}; }),
    notes: notes,
    createdAt: new Date().toISOString(),
    status: 'pending', fee: null
  };

  try{
    var fresh = await sbFetchKey('packageRequests');
    var list = fresh || [];
    list.push(reqObj);
    await sbWriteKey('packageRequests', list);

    var msg = buildPackageRequestMessage(reqObj);
    var num = formatPhoneForWhatsApp('01033104912');
    if(waWindow && num){ waWindow.location.href = 'https://wa.me/'+num+'?text='+encodeURIComponent(msg); }
    else if(waWindow){ waWindow.close(); }

    state.pkgSubmitting=false;
    state.pkgSubmitted=true;
    render();
  }catch(e){
    if(waWindow) waWindow.close();
    state.pkgSubmitting=false;
    state._pkgError='Something went wrong submitting your request. Please try again.';
    render();
  }
}

function renderPackageSuccess(){
  return '<div class="card success-box">'
    + '<div class="success-icon">📦</div>'
    + '<div class="success-title">Request submitted!</div>'
    + '<div class="success-text">Thanks'+(state._pkgName?', '+state._pkgName:'')+'! We\'re calculating fees for your request with SpaceCo Management — we\'ll follow up on WhatsApp shortly with the price.<br><br>Your slots aren\'t held yet — once you confirm the price on WhatsApp and we accept, we\'ll book everything and send you a confirmation.</div>'
    + '<button class="btn" style="margin-top:20px;max-width:260px;" onclick="resetPackageFlow()">Start another request</button>'
    + '</div>';
}

function resetPackageFlow(){
  state.pkgSubmitted=false;
  state.pkgLines=[];
  state._pkgError=null;
  render();
}

function selectRoom(r){ state.room=r; state.selectedStart=null; render(); }
function shiftDate(delta){
  var d=new Date(state.date+'T00:00:00');
  d.setDate(d.getDate()+delta);
  var nd = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  if(nd<todayStr()) return;
  state.date=nd; state.selectedStart=null; render();
}
function onDateChange(v){ if(v<todayStr())v=todayStr(); state.date=v; state.selectedStart=null; render(); }
function selectStart(m){ state.selectedStart=m; state.duration=60; render(); }
function onDurationChange(v){ state.duration=parseInt(v,10); render(); }

async function submitBooking(){
  var name=(document.getElementById('f-name').value||'').trim();
  var phone=(document.getElementById('f-phone').value||'').trim();
  var notes=(document.getElementById('f-notes').value||'').trim();
  state._name=name; state._phone=phone;

  if(!name || !phone){
    state._error='Please enter your name and phone number.';
    render(); return;
  }
  state._error=null; state.submitting=true; render();

  var fresh = await sbFetchKey('reservations');
  var reservations = fresh || [];
  var freshBlocks = await sbFetchKey('roomBlocks');
  var blocks = freshBlocks || [];
  var busy = getBusyRanges(state.date, state.room, reservations, blocks);
  var start=state.selectedStart, end=start+state.duration;

  if(!rangeIsFree(start, end, busy)){
    state.submitting=false;
    state._error='Sorry, this slot was just taken. Please pick another time.';
    state.reservations = reservations;
    state.blocks = blocks;
    state.selectedStart=null;
    render(); return;
  }

  var newRes = {
    id: 'ol_'+Date.now()+'_'+Math.random().toString(36).substr(2,6),
    client: name,
    phone: phone,
    room: state.room,
    date: state.date,
    from: minToTime(start),
    to: minToTime(end),
    notes: notes,
    created_by: 'online',
    source: 'online',
    status: 'pending'
  };
  reservations.push(newRes);

  try{
    await sbWriteKey('reservations', reservations);
    state.reservations = reservations;
    state.submitting=false;
    state.submitted=true;
    render();
  }catch(e){
    state.submitting=false;
    state._error='Something went wrong submitting your request. Please try again.';
    render();
  }
}

function resetFlow(){
  state.submitted=false;
  state.selectedStart=null;
  state._error=null;
  init();

function applyTheme(theme){
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('theme-toggle-btn').textContent = theme==='light' ? '☀️' : '🌙';
  document.getElementById('logo-img').src = 'data:image/png;base64,' + (theme==='light' ? LOGO_BLACK : LOGO_WHITE);
  try{ localStorage.setItem('spaceco-theme', theme); }catch(e){}
}
function toggleTheme(){
  var cur = document.documentElement.getAttribute('data-theme')==='light' ? 'dark' : 'light';
  applyTheme(cur);
}
(function(){
  var saved = null;
  try{ saved = localStorage.getItem('spaceco-theme'); }catch(e){}
  if(!saved){
    saved = (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
  }
  applyTheme(saved);
})();

init();
</script>
